<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Product Catalog Listing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; }
    header { padding: 1rem; border-bottom: 1px solid #ddd; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    main { padding: 1rem; }
    #product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .product-card { border: 1px solid #eee; border-radius: 4px; padding: 0.5rem; display: flex; flex-direction: column; }
    .product-card img { width: 100%; height: 160px; object-fit: cover; background: #f5f5f5; }
    .product-title { font-size: 0.9rem; font-weight: 600; margin: 0.5rem 0 0.25rem; }
    .product-price { font-size: 0.9rem; color: #0a7; }
    .status { font-size: 0.75rem; color: #666; }
    #status-bar { margin-bottom: 0.75rem; min-height: 1.2em; font-size: 0.85rem; color: #555; }
    #error-banner { display: none; padding: 0.75rem; margin-bottom: 0.75rem; background-color: #fdecea; color: #611a15; border: 1px solid #f5c6cb; border-radius: 4px; }
    #loading-indicator { display: none; font-size: 0.85rem; color: #555; }
  </style>
</head>
<body>
  <header>
    <select id="category-select">
      <option value="electronics">Electronics</option>
      <option value="books">Books</option>
      <option value="home">Home</option>
    </select>
    <input id="search-input" type="search" placeholder="Search products" aria-label="Search products" />
    <span id="loading-indicator">Loading...</span>
  </header>
  <main>
    <div id="error-banner" role="alert"></div>
    <div id="status-bar"></div>
    <div id="product-list"></div>
  </main>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
